services:
  trade-directory-service:
    build:
      context: .
      dockerfile: ./apps/trade-directory/Dockerfile
    env_file:
      - ./apps/trade-directory/.env
    environment:
      ROOT_DIR: '/usr/src/app/trade-directory'

  risk-operation-service:
    build:
      context: .
      dockerfile: ./apps/risk-operation/Dockerfile
    env_file:
      - ./apps/risk-operation/.env
    environment:
      ROOT_DIR: '/usr/src/app/risk-operation'

  customer-relationship-management-service:
    build:
      context: .
      dockerfile: ./apps/customer-relationship-management/Dockerfile
    env_file:
      - ./apps/customer-relationship-management/.env
    environment:
      ROOT_DIR: '/usr/src/app/customer-relationship-management'

  document-management-service:
    build:
      context: .
      dockerfile: ./apps/document-management/Dockerfile
    env_file:
      - ./apps/document-management/.env
    environment:
      ROOT_DIR: '/usr/src/app/document-management'

  notification-service:
    build:
      context: .
      dockerfile: ./apps/notification/Dockerfile
    env_file:
      - ./apps/notification/.env
    environment:
      ROOT_DIR: '/usr/src/app/notification'

  backend-gateway:
    image: nginx:1.25.3-alpine
    ports:
      - '80:80'
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

  postgres:
    image: postgres:14-alpine
    env_file:
      - .env
    ports:
      - '5433:5432'

  kafka:
    image: apache/kafka:latest    # Kafka 4.2.0 — KRaft only, no Zookeeper
    ports:
      - '50001:9092'
    environment:
      KAFKA_NODE_ID: '1'
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      KAFKA_LISTENERS: 'PLAINTEXT://:9092,CONTROLLER://:9093'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: '1'
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: '1'
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: '1'
      KAFKA_NUM_PARTITIONS: '1'
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: '0'
      CLUSTER_ID: 'gteCUb-aQUWR0vy7YCKmrQ'
    healthcheck:
      test: /opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

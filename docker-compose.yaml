services:
  trade-directory-service:
    build:
      context: .
      dockerfile: ./apps/trade-directory/Dockerfile
      target: development
    env_file:
      - ./apps/trade-directory/.env
    environment:
      ROOT_DIR: '/usr/src/app/dist/apps/trade-directory'
    volumes:
      - .:/usr/src/app
    command: npm run start:dev --project=trade-directory

  risk-operation-service:
    build:
      context: .
      dockerfile: ./apps/risk-operation/Dockerfile
      target: development
    env_file:
      - ./apps/risk-operation/.env
    environment:
      ROOT_DIR: '/usr/src/app/dist/apps/risk-operation'
    volumes:
      - .:/usr/src/app
    command: npm run start:dev --project=risk-operation

  customer-relationship-management-service:
    build:
      context: .
      dockerfile: ./apps/customer-relationship-management/Dockerfile
      target: development
    env_file:
      - ./apps/customer-relationship-management/.env
    environment:
      ROOT_DIR: '/usr/src/app/dist/apps/customer-relationship-management'
    volumes:
      - .:/usr/src/app
    command: npm run start:dev --project=customer-relationship-management

  document-management-service:
    build:
      context: .
      dockerfile: ./apps/document-management/Dockerfile
      target: development
    env_file:
      - ./apps/document-management/.env
    environment:
      ROOT_DIR: '/usr/src/app/dist/apps/document-management'
    volumes:
      - .:/usr/src/app
    command: npm run start:dev --project=document-management

  notification-service:
    build:
      context: .
      dockerfile: ./apps/notification/Dockerfile
      target: development
    env_file:
      - ./apps/notification/.env
    environment:
      ROOT_DIR: '/usr/src/app/dist/apps/notification'
    volumes:
      - .:/usr/src/app
    command: npm run start:dev --project=notification

  risk-agent-service:
    build:
      context: .
      dockerfile: ./apps/risk-agent/Dockerfile
      target: development
    env_file:
      - ./apps/risk-agent/.env
    environment:
      ROOT_DIR: '/usr/src/app/dist/apps/risk-agent'
    volumes:
      - .:/usr/src/app
    command: npm run start:dev --project=risk-agent

  knowledge-graph-service:
    build:
      context: .
      dockerfile: ./apps/knowledge-graph/Dockerfile
      target: development
    env_file:
      - ./apps/knowledge-graph/.env
    environment:
      ROOT_DIR: '/usr/src/app/dist/apps/knowledge-graph'
    volumes:
      - .:/usr/src/app
    depends_on:
      - neo4j
      - kafka
    command: npm run start:dev --project=knowledge-graph

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/sqfgraph
    ports:
      - '7474:7474'
      - '7687:7687'
    volumes:
      - neo4j-data:/data

  backend-gateway:
    image: nginx:1.25.3-alpine
    ports:
      - '80:80'
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

  postgres:
    image: postgres:14-alpine
    env_file:
      - .env
    ports:
      - '5434:5432'

  # Local S3-compatible object store for the document-management redesign
  # (dev only — production uses real S3 with Object Lock, provisioned via
  # Terraform; see CLAUDE.md "Planned: Document Management redesign").
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio-data:/data

  kafka:
    image: apache/kafka:latest    # Kafka 4.2.0 — KRaft only, no Zookeeper
    # Kafka repeatedly OOM-exits in dev, silently taking every dependent
    # service down (see CLAUDE.md known boot issues). Self-heal + capped heap.
    restart: unless-stopped
    ports:
      - '50001:9092'
    environment:
      KAFKA_HEAP_OPTS: '-Xmx512M -Xms256M'
      # KRaft identity
      KAFKA_NODE_ID: '1'
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      # Listeners: PLAINTEXT for service-to-kafka, CONTROLLER for KRaft consensus
      KAFKA_LISTENERS: 'PLAINTEXT://:9092,CONTROLLER://:9093'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      # Single-node dev settings
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: '1'
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: '1'
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: '1'
      KAFKA_NUM_PARTITIONS: '1'
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: '0'
      # Stable cluster ID — must stay the same across restarts
      CLUSTER_ID: 'gteCUb-aQUWR0vy7YCKmrQ'
    healthcheck:
      test: /opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  neo4j-data:
  minio-data:

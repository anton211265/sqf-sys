upstream trade-directory {
  server trade-directory-service:3000;
}
upstream risk-operation {
  server risk-operation-service:3000;
}
upstream customer-relationship-management {
  server customer-relationship-management-service:3000;
}
upstream document-management {
  server document-management-service:3000;
}
upstream knowledge-graph {
  server knowledge-graph-service:3000;
}
upstream notification {
  server notification-service:3000;
}
server {
  listen 80;
  client_max_body_size 100m;

  set $cors_origin "http://localhost:3001";

  add_header 'Access-Control-Allow-Origin' $cors_origin always;
  add_header 'Access-Control-Allow-Credentials' 'true' always;
  add_header 'Access-Control-Allow-Methods' 'GET,HEAD,PUT,PATCH,POST,DELETE,OPTIONS' always;
  add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, Accept' always;

  proxy_hide_header Access-Control-Allow-Origin;
  proxy_hide_header Access-Control-Allow-Credentials;
  proxy_hide_header Access-Control-Allow-Methods;
  proxy_hide_header Access-Control-Allow-Headers;

  location /trade-directory/ {
    if ($request_method = OPTIONS) {
      return 204;
    }
    proxy_pass http://trade-directory/trade-directory/;
  }
  location /risk-operation/ {
    if ($request_method = OPTIONS) {
      return 204;
    }
    proxy_pass http://risk-operation/risk-operation/;
  }
  location /customer-relationship-management/ {
    if ($request_method = OPTIONS) {
      return 204;
    }
    proxy_pass http://customer-relationship-management/customer-relationship-management/;
  }
  location /document-management/ {
    if ($request_method = OPTIONS) {
      return 204;
    }
    proxy_pass http://document-management/document-management/;
  }
  location /knowledge-graph/ {
    if ($request_method = OPTIONS) {
      return 204;
    }
    proxy_pass http://knowledge-graph/knowledge-graph/;
  }
  location /notification/ {
    if ($request_method = OPTIONS) {
      return 204;
    }
    proxy_pass http://notification/notification/;
  }
}